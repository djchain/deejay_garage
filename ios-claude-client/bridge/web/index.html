<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#050505">
<link rel="manifest" href="/manifest.json">
<title>Claude Remote</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<style>
:root {
  --bg:       #050505;
  --surface:  #0a0a0a;
  --elevated: #0f0f0f;
  --border:   #1a1a1a;
  --border-subtle: #1f1f1f;
  --text:       #ffffff;
  --text-2:     rgba(255,255,255,0.50);
  --text-3:     rgba(255,255,255,0.30);
  --text-4:     rgba(255,255,255,0.20);
  --green:      #34c759;
  --red:        #ff3b30;
  --fn-height:  48px;
  --top-height: 44px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:var(--bg); }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

#app {
  display:flex; flex-direction:column;
  height:100%; height:100dvh;
}

/* ── Top bar ─────────────── */
#topbar {
  display:flex; align-items:center;
  height:var(--top-height); min-height:var(--top-height);
  padding:0 12px; gap:10px;
  background:var(--surface);
  border-bottom:0.5px solid var(--border);
}
#menu-btn {
  background:none; border:none; color:var(--text-2);
  font-size:20px; width:32px; height:32px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
#title {
  font-size:13px; font-weight:600;
  font-family: 'Menlo', 'SF Mono', monospace;
  color:var(--text); letter-spacing:0.5px;
}
#status-row { margin-left:auto; display:flex; align-items:center; gap:6px; }
#status-dot { width:7px; height:7px; border-radius:50%; background:var(--red); }
#status-dot.online { background:var(--green); }
#status-label {
  font-size:10px; font-family:'Menlo','SF Mono',monospace;
  color:var(--text-2); letter-spacing:0.5px;
}

/* ── Terminal ────────────── */
#terminal {
  flex:1; overflow:hidden; background:var(--bg);
}
#terminal .xterm { height:100%; padding:4px 0 0 8px; }
#terminal .xterm-viewport { scroll-behavior:auto; }

/* ── Scroll-to-bottom FAB ── */
#scroll-btn {
  position:fixed; right:12px; bottom:calc(var(--fn-height) + 16px);
  width:36px; height:36px; border-radius:50%;
  background:var(--elevated); border:0.5px solid var(--border-subtle);
  color:var(--text-2); font-size:16px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:10;
  opacity:0; transform:scale(0.8); pointer-events:none;
  transition: opacity 0.15s, transform 0.15s;
}
#scroll-btn.visible {
  opacity:1; transform:scale(1); pointer-events:auto;
}

/* ── Function key bar ────── */
#fnbar {
  display:flex; height:var(--fn-height); min-height:var(--fn-height);
  background:var(--surface);
  border-top:0.5px solid var(--border);
  gap:0;
}
.fn-key {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
  background:none; border:none; color:var(--text-2);
  font-family:'Menlo','SF Mono',monospace;
  cursor:pointer; -webkit-tap-highlight-color: transparent;
  min-width:0; padding:4px 2px;
}
.fn-key:active { background:var(--elevated); }
.fn-key .icon { font-size:15px; line-height:1; font-weight:500; }
.fn-key .label { font-size:9px; line-height:1; letter-spacing:0.3px; color:var(--text-3); }

/* ── Sidebar overlay ─────── */
#sidebar-overlay {
  position:fixed; inset:0; z-index:50; pointer-events:none;
  background:transparent; transition:background 0.2s;
}
#sidebar-overlay.open { pointer-events:auto; background:rgba(0,0,0,0.5); }
#sidebar {
  position:absolute; left:0; top:0; bottom:0;
  width:280px; max-width:80vw;
  background:var(--surface);
  border-right:0.5px solid var(--border);
  display:flex; flex-direction:column;
  transform:translateX(-100%); transition:transform 0.2s ease;
  z-index:51;
}
#sidebar-overlay.open #sidebar { transform:translateX(0); }

#sidebar-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px;
  border-bottom:0.5px solid var(--border);
}
#sidebar-header h2 {
  font-size:15px; font-weight:600; color:var(--text);
  font-family:'Menlo','SF Mono',monospace;
}
#close-sidebar {
  background:none; border:none; color:var(--text-2);
  font-size:18px; width:28px; height:28px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}

#session-list { flex:1; overflow-y:auto; padding:8px 0; }
.session-row {
  display:flex; align-items:center; padding:10px 16px; gap:10px;
  cursor:pointer; border:none; background:none; width:100%;
  text-align:left; border-bottom:0.5px solid var(--border);
}
.session-row:active { background:var(--elevated); }
.session-row.current { background:var(--elevated); }
.session-dot {
  width:6px; height:6px; border-radius:50%; flex-shrink:0;
  background:var(--text-4);
}
.session-row.current .session-dot { background:var(--green); }
.session-info { flex:1; min-width:0; }
.session-name {
  font-size:14px; color:var(--text); white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.session-meta {
  font-size:11px; color:var(--text-3);
  font-family:'Menlo','SF Mono',monospace; margin-top:2px;
}
.session-delete {
  background:none; border:none; color:var(--red);
  font-size:14px; padding:6px; cursor:pointer; flex-shrink:0;
  opacity:0.5;
}
.session-delete:active { opacity:1; }

#sidebar-footer {
  padding:10px 16px; border-top:0.5px solid var(--border);
}
#new-session-row { display:flex; gap:6px; margin-bottom:8px; }
#new-session-input {
  flex:1; background:var(--bg); border:0.5px solid var(--border-subtle);
  color:var(--text); padding:8px 10px; font-size:13px;
  font-family:'Menlo','SF Mono',monospace;
  outline:none;
}
#new-session-input:focus { border-color:var(--text-3); }
#new-session-btn {
  background:var(--elevated); border:0.5px solid var(--border-subtle);
  color:var(--text-2); padding:8px 12px; font-size:12px;
  font-family:'Menlo','SF Mono',monospace;
  cursor:pointer; white-space:nowrap;
}
#new-session-btn:active { color:var(--text); }
#sidebar-connection {
  font-size:11px; color:var(--text-3);
  font-family:'Menlo','SF Mono',monospace;
  padding:6px 0; display:flex; align-items:center; gap:8px;
}
#reconnect-btn {
  background:none; border:0.5px solid var(--border-subtle);
  color:var(--text-2); padding:4px 10px; font-size:10px;
  font-family:'Menlo','SF Mono',monospace;
  cursor:pointer; margin-left:auto;
}
#reconnect-btn:active { color:var(--text); border-color:var(--text-2); }

/* No sessions empty state */
#no-sessions {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:40px 16px; gap:10px;
}
#no-sessions .icon { font-size:28px; color:var(--text-4); }
#no-sessions .msg { font-size:13px; color:var(--text-3); text-align:center; }

/* Toast */
#toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background:var(--elevated); border:0.5px solid var(--border-subtle);
  color:var(--text-2); padding:8px 16px;
  font-size:12px; font-family:'Menlo','SF Mono',monospace;
  border-radius:6px; z-index:100;
  opacity:0; transition:opacity 0.2s; pointer-events:none;
}
#toast.show { opacity:1; }
</style>
</head>
<body>

<div id="app">
  <header id="topbar">
    <button id="menu-btn" aria-label="Sessions">≡</button>
    <span id="title">Claude Remote</span>
    <div id="status-row">
      <span id="status-dot"></span>
      <span id="status-label">OFFLINE</span>
    </div>
  </header>
  <main id="terminal"></main>
  <footer id="fnbar">
    <button class="fn-key" data-key="ctrl-c"><span class="icon">⌃C</span><span class="label">CtrlC</span></button>
    <button class="fn-key" data-key="ctrl-d"><span class="icon">⌃D</span><span class="label">CtrlD</span></button>
    <button class="fn-key" data-key="esc"><span class="icon">⎋</span><span class="label">Esc</span></button>
    <button class="fn-key" data-key="tab"><span class="icon">⇥</span><span class="label">Tab</span></button>
    <button class="fn-key" data-key="up"><span class="icon">▲</span><span class="label">Up</span></button>
    <button class="fn-key" data-key="down"><span class="icon">▼</span><span class="label">Dn</span></button>
    <button id="paste-btn" class="fn-key" aria-label="Paste"><span class="icon">⬚</span><span class="label">Pst</span></button>
  </footer>
</div>

<div id="sidebar-overlay">
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2>Sessions</h2>
      <button id="close-sidebar">×</button>
    </div>
    <div id="session-list"></div>
    <div id="sidebar-footer">
      <div id="new-session-row">
        <input id="new-session-input" type="text" placeholder="Session name…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button id="new-session-btn">Create</button>
      </div>
      <div id="sidebar-connection">
        <span id="conn-info">—</span>
        <button id="reconnect-btn">Reconn</button>
      </div>
    </div>
  </aside>
</div>

<button id="scroll-btn" aria-label="Scroll to bottom">↓</button>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
<script>
// ── DOM refs ────────────────────────────────────────
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const terminalEl   = $('#terminal');
const statusDot    = $('#status-dot');
const statusLabel  = $('#status-label');
const scrollBtn    = $('#scroll-btn');
const menuBtn      = $('#menu-btn');
const closeSidebar = $('#close-sidebar');
const sidebarOver  = $('#sidebar-overlay');
const sessionList  = $('#session-list');
const newInput     = $('#new-session-input');
const createBtn    = $('#new-session-btn');
const connInfo     = $('#conn-info');
const reconnectBtn = $('#reconnect-btn');
const toast        = $('#toast');
const fnKeys       = $$('.fn-key');
const pasteBtn     = $('#paste-btn');

// ── xterm ───────────────────────────────────────────
const term = new Terminal({
  fontSize:          13,
  fontFamily:        'Menlo, Monaco, "Courier New", monospace',
  cursorBlink:       true,
  cursorStyle:       'bar',
  allowProposedApi:  true,
  scrollback:        50000,
  theme: {
    background: '#050505',
    foreground: '#ffffff',
    cursor:     '#ffffff',
    cursorAccent: '#050505',
    selectionBackground: 'rgba(255,255,255,0.15)',
    black:   '#1a1a1a',
    red:     '#ff3b30',
    green:   '#34c759',
    yellow:  '#ffcc00',
    blue:    '#0a84ff',
    magenta: '#ff5ab3',
    cyan:    '#5ac8fa',
    white:   '#ffffff',
    brightBlack:   '#3a3a3a',
    brightRed:     '#ff6b60',
    brightGreen:   '#4cd964',
    brightYellow:  '#ffd633',
    brightBlue:    '#409cff',
    brightMagenta: '#ff7bc4',
    brightCyan:    '#7ad6ff',
    brightWhite:   '#ffffff',
  },
});

const fitAddon = new FitAddon.FitAddon();
const webLinksAddon = new WebLinksAddon.WebLinksAddon();
term.loadAddon(fitAddon);
term.loadAddon(webLinksAddon);
term.open(terminalEl);
fitAddon.fit();

// ── Scroll-to-bottom ───────────────────────────────
let isAtBottom = true;
term.onScroll(({ viewportY, baseY }) => {
  // baseY === 0 when there's no scrollback yet
  const atBottom = baseY === 0 || viewportY === baseY;
  if (atBottom !== isAtBottom) {
    isAtBottom = atBottom;
    scrollBtn.classList.toggle('visible', !isAtBottom);
  }
});
scrollBtn.addEventListener('click', () => { term.scrollToBottom(); term.focus(); });

// ── Toast ───────────────────────────────────────────
let toastTimer;
function showToast(msg, ms=1800) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
}

// ── Sidebar ─────────────────────────────────────────
function openSidebar()  { sidebarOver.classList.add('open'); }
function closeSidebarFn(){ sidebarOver.classList.remove('open'); }
menuBtn.addEventListener('click', openSidebar);
closeSidebar.addEventListener('click', closeSidebarFn);
sidebarOver.addEventListener('click', (e) => { if (e.target === sidebarOver) closeSidebarFn(); });

// Edge swipe to open sidebar
let touchStartX = 0;
document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', (e) => {
  if (touchStartX < 16 && e.changedTouches[0].clientX - touchStartX > 50) openSidebar();
});

// ── State ───────────────────────────────────────────
let currentSession = '';
let sessions = [];
let ws = null;
let reconnectTimer = null;
let reconnectAttempts = 0;
const MAX_RECONNECT   = 10;
const RECONNECT_BASE  = 1000;  // 1s base

// ── WebSocket ───────────────────────────────────────
function wsUrl() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${proto}//${location.host}/ws`;
}

function connect() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  setStatus('connecting');

  ws = new WebSocket(wsUrl());
  ws.onopen = () => {
    reconnectAttempts = 0;
    // Terminal is cleared by history dump from bridge
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch (_) { return; }
    handleMessage(msg);
  };

  ws.onclose = () => {
    ws = null;
    setStatus('disconnected');
    scheduleReconnect();
  };

  ws.onerror = () => { /* onclose fires next */ };
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'history':
      // Full scrollback from bridge on connect
      term.write(msg.data);
      break;
    case 'output':
      term.write(msg.data);
      break;
    case 'pong':
      setStatus('connected');
      break;
    case 'session_list':
      sessions = msg.sessions || [];
      currentSession = msg.current_session || currentSession;
      renderSessions();
      break;
    case 'session_detached':
      showToast(`Detached: ${msg.session}`);
      break;
    case 'session_switched':
    case 'session_created':
      currentSession = msg.session;
      renderSessions();
      closeSidebarFn();
      if (msg.type === 'session_switched') showToast(`Switched: ${msg.session}`);
      break;
    case 'session_killed':
      showToast(`Killed: ${msg.session}`);
      break;
    case 'error':
      showToast(msg.message, 3000);
      break;
  }
  // First output or pong transitions us to connected
  if ((msg.type === 'output' || msg.type === 'history') && statusLabel.textContent !== 'ONLINE') {
    setStatus('connected');
  }
}

function setStatus(s) {
  const map = {
    connected:    ['ONLINE',  true],
    connecting:   ['CONN…',   false],
    disconnected: ['OFFLINE', false],
  };
  const [label, online] = map[s] || map.disconnected;
  statusLabel.textContent = label;
  statusDot.classList.toggle('online', online);
  connInfo.textContent = location.host;
}

function scheduleReconnect() {
  if (reconnectAttempts >= MAX_RECONNECT) {
    showToast('Max reconnects reached', 3000);
    return;
  }
  const delay = RECONNECT_BASE * Math.pow(2, reconnectAttempts);
  reconnectAttempts++;
  statusLabel.textContent = `RCON ${reconnectAttempts}`;
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(connect, delay);
}

reconnectBtn.addEventListener('click', () => {
  reconnectAttempts = 0;
  if (ws) { ws.close(); ws = null; }
  connect();
});

// ── Function keys ───────────────────────────────────
const KEY_MAP = {
  'ctrl-c': { type:'signal', name:'int' },
  'ctrl-d': { type:'signal', name:'eof' },
  'esc':    { type:'input',  data:'\x1b' },
  'tab':    { type:'input',  data:'\t' },
  'up':     { type:'input',  data:'\x1b[A' },
  'down':   { type:'input',  data:'\x1b[B' },
};

fnKeys.forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.key;
    const msg = KEY_MAP[key];
    if (msg) send(msg);
    term.focus();
  });
});

// ── Paste ───────────────────────────────────────────
pasteBtn.addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    if (text) {
      send({ type:'input', data:text });
      showToast('Pasted');
    }
  } catch (_) {
    // Clipboard API may not be available — fallback: focus terminal
    showToast('Use keyboard paste');
  }
  term.focus();
});

// ── Terminal input ──────────────────────────────────
term.onData((data) => {
  send({ type:'input', data });
});

// ── Resize ──────────────────────────────────────────
const ro = new ResizeObserver(() => {
  fitAddon.fit();
  send({ type:'resize', cols:term.cols, rows:term.rows });
});
ro.observe(terminalEl);

// ── Session list ────────────────────────────────────
function renderSessions() {
  if (sessions.length === 0) {
    sessionList.innerHTML = `
      <div id="no-sessions">
        <span class="icon">▣</span>
        <span class="msg">No tmux sessions</span>
      </div>`;
    return;
  }
  sessionList.innerHTML = sessions.map(s => `
    <button class="session-row${s.name === currentSession?' current':''}"
            data-session="${s.name}">
      <span class="session-dot"></span>
      <span class="session-info">
        <div class="session-name">${escHtml(s.name)}</div>
        <div class="session-meta">${s.windows} window${s.windows===1?'':'s'}</div>
      </span>
      <span class="session-delete" data-delete="${s.name}">×</span>
    </button>
  `).join('');

  // Click session → switch
  sessionList.querySelectorAll('.session-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('.session-delete')) return;
      const name = row.dataset.session;
      if (name !== currentSession) {
        send({ type:'switch_session', sessionName:name });
      }
    });
  });

  // Delete session
  sessionList.querySelectorAll('.session-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const name = btn.dataset.delete;
      if (confirm(`Kill session "${name}"?`)) {
        send({ type:'kill_session', sessionName:name });
      }
    });
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── New session ─────────────────────────────────────
function createSession() {
  const name = newInput.value.trim();
  if (!name) return;
  send({ type:'new_window', sessionName:name });
  newInput.value = '';
}
createBtn.addEventListener('click', createSession);
newInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') createSession();
});

// ── Start ───────────────────────────────────────────
connect();
term.focus();
</script>
</body>
</html>
